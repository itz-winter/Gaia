# ================================================
#          Gaia Anticheat Configuration
#        Packet-level Minecraft Anticheat
#          Supports MC 1.8 - 26.1.2
# ================================================

config-version: 1 # dont touch pls

general:
  # Violation decay interval in seconds (default: 300 = 5 minutes)
  decay-interval: 300
  # All player's violations will be cleared every interval
  # decay-amount is how many violation points to remove from each check every decay interval. Set to "all" to clear all violations instead.
  decay-amount: "all"
  decay-message: "&8Gaia &7\u00BB &7Violations cleared for all online players!"

# ================================================
#               Debug Settings
# ================================================
debug:
  # Enable verbose console logging for all flag events (even below threshold).
  # Includes full player state: position, TPS, ping, motion, buffers, exemptions.
  # Useful for diagnosing false positives / missed detections.
  # Disable in production — adds console spam.
  enabled: false
  # If true, log every check evaluation (not just flags). VERY spammy — only for deep diagnosis.
  verbose: false

# ================================================
#              Discord Integration
# ================================================
discord:
  enabled: false
  webhook-url: ""

# ================================================
#              Alert Settings
# ================================================
alerts:
  enabled: true
  console: true
  # placeholders: {player}, {check}, {type}, {vl}, {threshold}
  format: "&8Gaia &7\u00BB &f{player} &7failed &c{check} &7({type}) &7[&f{vl}&7/&f{threshold}&7]"

# ================================================
#            Punishment Settings
# ================================================
punishment:
  enabled: true
  # Command to execute when VL exceeds threshold. {player} is replaced with player name.
  command: "kick {player} [Gaia] {check} ({type}) {vl}/{threshold}"

